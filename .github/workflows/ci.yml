name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend contract tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          python -m py_compile app/reports/fund_research_report.py app/data/market_context_fetcher.py app/data/fund_events.py app/data/providers/fusion.py app/api/fund.py

      - name: Run focused backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          python -m pytest \
            tests/test_dsa_p0_fields_provider_health.py \
            tests/test_fund_research_report.py \
            tests/test_provider_health.py \
            tests/test_fund_job_status.py \
            tests/test_backtest_metrics.py \
            tests/test_fund_events.py \
            -q

  frontend:
    name: Frontend build and BFF tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend and BFF
        run: npm run build
