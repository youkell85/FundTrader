server {
    listen 80;
    server_name _;

    # gzip 压缩 — JS/CSS 可减少 65-80% 传输量
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/x-javascript
        font/ttf
        font/woff
        font/woff2
        image/svg+xml;

    # v2 前端静态资源 - nginx 直接服务，跳过 Node.js 提升性能
    location /fund/assets/ {
        alias /opt/fundtrader/v2/frontend/dist/public/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # v2 前端 BFF (TRPC) - 代理到 Hono Node.js 服务
    location /fund/api/trpc {
        proxy_pass http://127.0.0.1:3000/fund/api/trpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    location /fund/api/trpc/ {
        proxy_pass http://127.0.0.1:3000/fund/api/trpc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    # FundTrader 后端 API - 代理到 FastAPI
    location /fund/api/ {
        proxy_pass http://127.0.0.1:8766/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # v2 前端页面 - 代理到 Hono Node.js 服务
    location /fund/ {
        proxy_pass http://127.0.0.1:3000/fund/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }
}